{# Общий макрос полей формы книги (используется на страницах добавления и редактирования). #}
{% macro book_fields(book, genres, selected_genre_ids) %}
    <div class="mb-3">
        <label class="form-label" for="title">Название</label>
        <input type="text" class="form-control" id="title" name="title"
               value="{{ book.title or '' }}" required>
    </div>
    <div class="row">
        <div class="col-md-4 mb-3">
            <label class="form-label" for="year">Год</label>
            <input type="number" class="form-control" id="year" name="year"
                   value="{{ book.year or '' }}" required>
        </div>
        <div class="col-md-8 mb-3">
            <label class="form-label" for="publisher">Издательство</label>
            <input type="text" class="form-control" id="publisher" name="publisher"
                   value="{{ book.publisher or '' }}" required>
        </div>
    </div>
    <div class="row">
        <div class="col-md-8 mb-3">
            <label class="form-label" for="author">Автор</label>
            <input type="text" class="form-control" id="author" name="author"
                   value="{{ book.author or '' }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label" for="pages">Объём (страниц)</label>
            <input type="number" min="1" class="form-control" id="pages" name="pages"
                   value="{{ book.pages or '' }}" required>
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label" for="genre_ids">Жанры</label>
        <select class="form-select" id="genre_ids" name="genre_ids" multiple required>
            {% for genre in genres %}
                <option value="{{ genre.id }}"
                    {% if genre.id in selected_genre_ids %}selected{% endif %}>{{ genre.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label" for="short_desc">Описание</label>
        <textarea class="form-control" id="short_desc" name="short_desc" rows="8">{{ book.short_desc or '' }}</textarea>
    </div>
{% endmacro %}
