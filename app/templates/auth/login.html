{% extends 'base.html' %}

{% block title %}Вход — Электронная библиотека{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h1 class="mb-4">Вход</h1>
        <form method="post" action="{{ url_for('auth.login', next=request.args.get('next')) }}">
            <div class="mb-3">
                <label class="form-label" for="login">Логин</label>
                <input type="text" class="form-control" id="login" name="login" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">Пароль</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                <label class="form-check-label" for="remember_me">Запомнить меня</label>
            </div>
            <button type="submit" class="btn btn-primary">Войти</button>
        </form>
    </div>
</div>
{% endblock %}
